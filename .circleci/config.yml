version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  build_and_deploy:
    docker:
      - image: cimg/node:24.14
    environment:
      AWS_REGION: us-west-2
      S3_BUCKET: ualibraries-libapps-sandbox
      SNAPSHOT_PREFIX: visual-baselines
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Install Playwright Chromium
          command: npx playwright install --with-deps chromium
      - run:
          name: Update visual baseline snapshots
          command: npm run test:visual:update
      - run:
          name: Build project
          command: npm run build
      - run:
          name: Deploy dist, images, and visual snapshots to S3
          command: |
            aws s3 sync dist "s3://${S3_BUCKET}" --delete
            aws s3 sync images "s3://${S3_BUCKET}/images" --delete
            aws s3 sync tests/visual.spec.js-snapshots "s3://${S3_BUCKET}/${SNAPSHOT_PREFIX}" --delete

workflows:
  deploy_on_main:
    jobs:
      - build_and_deploy:
          filters:
            branches:
              only:
                - main
                - story/17198_vr_ci
