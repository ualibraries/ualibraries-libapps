<body class="s-lg-guide-body d-flex flex-column h-100">
  <a href="#s-lib-public-main" class="visually-hidden-focusable btn btn-dark position-absolute start-50 translate-middle-x z-1 mt-1">Skip to main content</a>
  {{ADMIN_CMD_BAR}}
  <div id="ualibraries-guide-header">
    {{public_header}}
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="my-3">
            {{breadcrumbs}}
          </div>
        </div>
      </div>
    </div>
  </div>
  <main class="flex-shrink-0 mb-5">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <h1 class="mt-0">{{guide_title}}: {{page_title}}</h1>
        </div>
      </div>
      <div class="row">
        <div class="col-12 col-lg-9 order-2">
          <div id="s-lib-public-main" class="s-lib-main">
            {{content}}
          </div>
        </div>
        <div class="col-12 col-lg-3 order-1">
          <ul id="ualibraries-guide-sidebar-nav" class="nav nav-pills flex-column mb-5">
            {{guide_nav}}
          </ul>
          <div id="ualibraries-guide-sidebar-profile" class="mb-3">
            {{content_box_profile}}
          </div>
          <div id="ualibraries-guide-sidebar-boxes">
            {{side_nav_boxes}}
            {{guide_subjects}}
            {{guide_tags}}
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="s-lib-alert" title=""><div id="s-lib-alert-content"></div></div>

  {{public_footer}}
</body>
